[package]
name = "reml_runtime"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
path = "src/lib.rs"

[dependencies]
unicode-segmentation = "1.11"
unicode-width = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
indexmap = "1.9"
unicode-normalization = "0.1"
once_cell = "1.19"

[dev-dependencies]
humantime = "2.1"
